<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --ink: #1a1a2e;
  --paper: #faf9f6;
  --accent: #c8a96e;
  --accent-dark: #a8864a;
  --muted: #7a7a8c;
  --border: #e2e0d8;
  --error: #c0392b;
  --success: #27ae60;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--paper);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

body::before {
  content: '';
  position: fixed;
  top: -40%;
  right: -20%;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(200, 169, 110, 0.12) 0%, transparent 70%);
  pointer-events: none;
}

body::after {
  content: '';
  position: fixed;
  bottom: -30%;
  left: -15%;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(26, 26, 46, 0.06) 0%, transparent 70%);
  pointer-events: none;
}

.container {
  width: 420px;
  background: white;
  border: 1px solid var(--border);
  border-radius: 2px;
  padding: 48px 44px;
  box-shadow: 0 4px 40px rgba(26, 26, 46, 0.08);
  position: relative;
  animation: fadeUp 0.5s ease both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

.container::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 40px; height: 40px;
  border-top: 3px solid var(--accent);
  border-left: 3px solid var(--accent);
}

.container::after {
  content: '';
  position: absolute;
  bottom: 0; right: 0;
  width: 40px; height: 40px;
  border-bottom: 3px solid var(--accent);
  border-right: 3px solid var(--accent);
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 32px;
}

.brand-dot {
  width: 8px;
  height: 8px;
  background: var(--accent);
  border-radius: 50%;
}

.brand-name {
  font-family: 'DM Serif Display', serif;
  font-size: 15px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink);
}

h2 {
  font-family: 'DM Serif Display', serif;
  font-size: 32px;
  font-weight: 400;
  color: var(--ink);
  line-height: 1.1;
  margin-bottom: 6px;
}

.subtitle {
  font-size: 14px;
  color: var(--muted);
  font-weight: 300;
  margin-bottom: 36px;
}

.field {
  margin-bottom: 20px;
}

label {
  display: block;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
}

input {
  width: 100%;
  padding: 12px 14px;
  background: var(--paper);
  border: 1px solid var(--border);
  border-radius: 2px;
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  color: var(--ink);
  transition: border-color 0.2s, box-shadow 0.2s;
  outline: none;
}

input::placeholder { color: #bbb; }

input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(200, 169, 110, 0.12);
  background: white;
}

input.invalid {
  border-color: var(--error);
  box-shadow: 0 0 0 3px rgba(192, 57, 43, 0.08);
}

button {
  width: 100%;
  padding: 14px;
  background: var(--ink);
  color: white;
  border: none;
  border-radius: 2px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 500;
  letter-spacing: 0.06em;
  cursor: pointer;
  transition: background 0.2s, transform 0.1s;
  margin-top: 8px;
  position: relative;
  overflow: hidden;
}

button:hover:not(:disabled) { background: #2d2d4a; }
button:active:not(:disabled) { transform: scale(0.99); }
button:disabled { opacity: 0.6; cursor: not-allowed; }

.btn-text { transition: opacity 0.2s; }

.spinner {
  display: none;
  position: absolute;
  inset: 0;
  align-items: center;
  justify-content: center;
}

button.loading .btn-text { opacity: 0; }
button.loading .spinner { display: flex; }

.spinner::after {
  content: '';
  width: 16px;
  height: 16px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.signup-link {
  display: block;
  text-align: center;
  margin-top: 24px;
  font-size: 13px;
  color: var(--muted);
  text-decoration: none;
}

.signup-link span {
  color: var(--ink);
  font-weight: 500;
  text-decoration: underline;
  text-underline-offset: 3px;
}

.signup-link:hover span { color: var(--accent-dark); }

#msg {
  margin-top: 16px;
  padding: 10px 14px;
  border-radius: 2px;
  font-size: 13px;
  text-align: center;
  display: none;
}

#msg.error {
  background: #fdf2f2;
  border: 1px solid #f5c6c6;
  color: var(--error);
  display: block;
}

#msg.success {
  background: #f2fbf6;
  border: 1px solid #b2dfc5;
  color: var(--success);
  display: block;
}

</style>
</head>
<body>

<div class="container">

  <div class="brand">
    <div class="brand-dot"></div>
    <span class="brand-name">Platform</span>
  </div>

  <h2>Welcome back</h2>
  <p class="subtitle">Sign in to your account to continue.</p>

  <div class="field">
    <label for="username">Username</label>
    <input id="username" type="text" placeholder="Enter your username" autocomplete="username">
  </div>

  <div class="field">
    <label for="password">Password</label>
    <input id="password" type="password" placeholder="Enter your password" autocomplete="current-password">
  </div>

  <button id="loginBtn" onclick="login()">
    <span class="btn-text">Log In</span>
    <span class="spinner"></span>
  </button>

  <a href="/signup-page" class="signup-link">Don't have an account? <span>Sign up</span></a>

  <p id="msg"></p>

</div>

<script>

function setMessage(text, type) {
  const msg = document.getElementById("msg");
  msg.textContent = text;
  msg.className = type;
}

function clearInvalid() {
  document.getElementById("username").classList.remove("invalid");
  document.getElementById("password").classList.remove("invalid");
}

function login() {
  const usernameEl = document.getElementById("username");
  const passwordEl = document.getElementById("password");
  const username   = usernameEl.value.trim();
  const password   = passwordEl.value;
  const btn        = document.getElementById("loginBtn");

  clearInvalid();

  // --- Input validation ---
  if (!username) {
    setMessage("Please enter your username.", "error");
    usernameEl.classList.add("invalid");
    usernameEl.focus();
    return;
  }
  if (!password) {
    setMessage("Please enter your password.", "error");
    passwordEl.classList.add("invalid");
    passwordEl.focus();
    return;
  }

  // --- Loading state ---
  btn.disabled = true;
  btn.classList.add("loading");
  setMessage("", "");

  fetch("http://127.0.0.1:5000/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ username, password })
  })
  .then(res => {
    if (!res.ok && res.status !== 401) {
      throw new Error("Server error (" + res.status + ")");
    }
    return res.json();
  })
  .then(data => {
    if (data.error) {
      setMessage(data.error, "error");
      passwordEl.classList.add("invalid");
      passwordEl.value = "";
      passwordEl.focus();
      return;
    }

    setMessage("Login successful! Redirecting…", "success");

    setTimeout(() => {

        const id = data.user_id || 1;

        if (data.role_id === 1)
            window.location.href = "/producer/" + id;

        else if (data.role_id === 2)
            window.location.href = "/warehouse/" + id;

        else if (data.role_id === 3)
            window.location.href = "/customer/" + id;

        else
            window.location.href = "/";

    }, 800);
  })
  .catch(err => {
    setMessage("Could not connect to the server. Please try again.", "error");
    console.error("Login error:", err);
  })
  .finally(() => {
    btn.disabled = false;
    btn.classList.remove("loading");
  });
}

document.addEventListener("keydown", e => {
  if (e.key === "Enter") login();
});

</script>
</body>
</html>
